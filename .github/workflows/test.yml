name: CI

on:
  push:
    branches:
      - master
  pull_request:
  workflow_dispatch:

jobs:
  test:
    name: Tests on ${{ matrix.go-version }} ${{ matrix.platform }}
    strategy:
      matrix:
        go-version: ['1.25']
        platform: [ubuntu-latest, macos-latest, windows-2022]
        # TODO: add windows-11-arm after fixing clang -mthreads issue
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Install Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ matrix.go-version }}

      - name: Checkout
        uses: actions/checkout@v4

      - name: Unzip libv8
        shell: bash
        run: |
          files=$(find . -name "libv8*.zip")
          for file in $files; do
            dir=$(dirname "$file")
            echo "Extracting $file to directory $dir"
            unzip -o -d "$dir" "$file"
          done

      - name: Copy MSVC CRT libraries (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $vsPath = & "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $msvcDir = Get-ChildItem "$vsPath\VC\Tools\MSVC" | Sort-Object Name -Descending | Select-Object -First 1
          $msvcLib = "$($msvcDir.FullName)\lib\x64"
          $sdkDir = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\Lib" | Where-Object { $_.Name -match '^\d' } | Sort-Object Name -Descending | Select-Object -First 1
          $ucrtLib = "$($sdkDir.FullName)\ucrt\x64"

          Write-Host "MSVC lib path: $msvcLib"
          Write-Host "UCRT lib path: $ucrtLib"

          $dest = "deps\windows_x86_64"
          Copy-Item "$msvcLib\libvcruntime.lib" $dest
          Copy-Item "$msvcLib\libcmt.lib" $dest
          Copy-Item "$ucrtLib\libucrt.lib" $dest
          Copy-Item "$msvcLib\libcpmt.lib" $dest
          Copy-Item "$msvcLib\oldnames.lib" $dest

          Write-Host "Copied MSVC CRT libraries:"
          Get-ChildItem $dest -Filter *.lib | ForEach-Object { Write-Host "  $($_.Name) ($($_.Length) bytes)" }

      - name: Go Test (Unix)
        if: runner.os != 'Windows'
        env:
          CGO_CXXFLAGS: "-Werror"
        run: go test -v -coverprofile c.out ./...

      - name: Go Test (Windows)
        if: runner.os == 'Windows'
        env:
          CGO_ENABLED: '1'
        run: go test -v ./...

      - name: Upload coverage to Codecov
        if: runner.os != 'Windows'
        uses: codecov/codecov-action@v1
        env:
          OS: ${{ matrix.platform }}
          GO: ${{ matrix.go-version }}
        with:
          files: ./c.out
          env_vars: OS,GO

      - name: Add GOPATH to GITHUB_ENV
        if: runner.os != 'Windows'
        run: echo "GOPATH=$(go env GOPATH)" >>"$GITHUB_ENV"

      - name: Scan and upload FOSSA data (Linux/Mac)
        if: runner.os != 'Windows' && env.FOSSA_API_KEY != '' && github.ref == 'refs/heads/master'
        run: |
          curl -H 'Cache-Control: no-cache' https://raw.githubusercontent.com/fossas/fossa-cli/master/install.sh | sudo bash
          fossa analyze
        env:
          FOSSA_API_KEY: ${{ secrets.FOSSA_API_KEY }}
