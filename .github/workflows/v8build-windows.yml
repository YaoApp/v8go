name: V8 Build (Windows x86_64)

on: workflow_dispatch

jobs:
  build-windows-x86_64:
    name: Build V8 for windows x86_64
    runs-on: windows-2022
    env:
      DEPOT_TOOLS_WIN_TOOLCHAIN: '0'
      DEPOT_TOOLS_UPDATE: '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: true
          fetch-depth: 1

      - name: Setup git config
        shell: bash
        run: |
          git config --global core.autocrlf false
          git config --global core.filemode false
          git config --global core.fscache true
          git config --global core.preloadindex true

      - name: Update depot_tools fetch config
        shell: bash
        run: |
          cd deps/depot_tools
          git config --unset-all remote.origin.fetch || true
          git config --add remote.origin.fetch +refs/heads/*:refs/remotes/origin/*

      - name: Bootstrap depot_tools
        shell: cmd
        run: |
          cd deps\depot_tools
          call bootstrap\win_tools.bat

      - name: Build V8
        shell: cmd
        run: |
          cd deps
          python build_windows.py --arch x86_64

      - name: Debug ICU BUILD.gn (on failure)
        if: failure()
        shell: bash
        run: |
          echo "=== ICU BUILD.gn icudata section ==="
          grep -n -A2 -B2 "icudt\|icudata\|is_win\|make_data_assembly\|data_bundle\|SHARED\|STATIC" deps/v8/third_party/icu/BUILD.gn || echo "BUILD.gn not found"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: v8_monolith-windows-x86_64
          path: deps/windows_x86_64/v8_monolith.lib
